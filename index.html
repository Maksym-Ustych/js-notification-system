<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична 6 - Notification System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Практична робота №6</h1>
    <h2>Notification System</h2>

    <p>Натисніть кнопку для створення повідомлення.</p>

    <div class="controls">
        <label for="positionSelect">Позиція:</label>
        <select id="positionSelect">
            <option value="top-right">Top Right</option>
            <option value="top-left">Top Left</option>
            <option value="bottom-right">Bottom Right</option>
            <option value="bottom-left">Bottom Left</option>
        </select>
    </div>

    <div class="buttons">
        <button class="btn success" data-type="success">Success</button>
        <button class="btn error" data-type="error">Error</button>
        <button class="btn warning" data-type="warning">Warning</button>
        <button class="btn info" data-type="info">Info</button>
    </div>

    <div id="notifications" class="notifications top-right"></div>

    <script src="script.js"></script>
</body>
</html>
